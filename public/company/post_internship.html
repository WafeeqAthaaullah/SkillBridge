<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Internship</title>
    <link rel="stylesheet" href="css/company_portal.css"> <!-- LINK TO THE SHARED PORTAL STYLE -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="logo">
            <img src="../images/logo_white-removebg-preview.png" alt="SkillBridge logo">
        </div>
        <h1 class="dashboard-header-title">Post New Internship</h1>
        <nav class="dashboard-nav">
            <ul>
                <li><a href="company_dashboard.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="manage_internships.html"><i class="fas fa-briefcase"></i> Internships</a></li>
                <li><a href="view_applications.html"><i class="fas fa-users"></i> Applications</a></li>
                <li><a href="company_profile.html"><i class="fas fa-building"></i> Profile</a></li>
                <li><a href="../logout.html" id="logoutButton"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <div class="user-profile">
            <span id="companyNameDisplay">Company Name</span>
            <i class="fas fa-caret-down"></i>
            <!-- Dropdown menu would go here -->
        </div>
    </header>

    <main class="dashboard-main-content">
        <h2 class="dashboard-section-title">Share Your Opportunity</h2>

        <section class="post-internship-form-section form-card"> <!-- Reusing form-card for consistency -->
            <h3 class="dashboard-section-subtitle">Internship Details</h3>
            <form id="postInternshipForm">
                <div class="input-group">
                    <label for="internshipTitle">Internship Title:</label>
                    <input type="text" id="internshipTitle" required>
                </div>
                <div class="input-group">
                    <label for="internshipLocation">Location:</label>
                    <input type="text" id="internshipLocation" placeholder="e.g., New York, NY or Remote" required>
                </div>
                <div class="input-group">
                    <label for="internshipDuration">Duration (e.g., '12 weeks', 'Summer 2025'):</label>
                    <input type="text" id="internshipDuration" required>
                </div>
                <div class="input-group">
                    <label for="internshipStipend">Stipend (USD, per month/total, e.g., '1500', 'Negotiable'):</label>
                    <input type="text" id="internshipStipend" required>
                </div>
                <div class="input-group">
                    <label for="internshipDescription">Internship Description:</label>
                    <textarea id="internshipDescription" rows="8" required></textarea>
                </div>
                <div class="input-group">
                    <label for="internshipRequirements">Key Requirements:</label>
                    <textarea id="internshipRequirements" rows="5" placeholder="List skills, qualifications, tools, etc."></textarea>
                </div>
                <div class="input-group">
                    <label for="internshipStartDate">Start Date</label>
                    <input type="date" id="internshipStartDate" name="start_date" required>
                </div>
                <div class="form-actions" style="justify-content: center;"> <!-- Center buttons -->
                    <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> Post Internship</button>
                    <button type="reset" class="btn-secondary"><i class="fas fa-undo"></i> Reset Form</button>
                </div>
            </form>
        </section>
    </main>

    <script src="scripts/post_internship.js"></script>
</body>
</html>
