<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Sign Up</title>
    <link rel="stylesheet" href="css\login.css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img src="../images/logo_white-removebg-preview.png" alt="Skillbridge logo"> </div>
            <h1 class="header-title">Join Our Platform</h1>
            <p class="header-subtitle">Create your company account to post internships and manage applications efficiently.</p>
        </header>

        <main class="main-content">
            <div class="form-card">
                <h2 class="form-title">Sign Up Your Company</h2>
                
                <a href="#" class="social-login-button">
                    <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_64dp.png" alt="Google Logo" class="google-logo">
                    Sign up with Google
                </a>

                <div class="or-separator">OR</div>

                <form id="companySignupForm">
                    <div class="input-group">
                        <input type="text" id="companyName" placeholder="Company Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="companyEmail" placeholder="Company Email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    </div>
                    <div class="input-group">
                        <input type="text" id="companyIndustry" placeholder="Industry (Optional)">
                    </div>
                    <div class="input-group">
                        <input type="url" id="companyWebsite" placeholder="Website (Optional) - e.g., https://yourcompany.com">
                    </div>
                    
                    <button type="submit" class="login-button"><i class="fas fa-user-plus"></i> Register Company</button>
                    <p class="signup-text">Already have an account? <a href="company_login.html" class="link">Login here</a></p>
                </form>
            </div>
        </main>
    </div>

    <script src="scripts/signupscript.js"></script>
</body>
</html>
