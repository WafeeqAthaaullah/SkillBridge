<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profile Management</title>
    <link rel="stylesheet" href="css/company_portal.css"> 
    <link rel="stylesheet" href="css/company_profile_style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="logo">
            <img src="../images/logo_white-removebg-preview.png" alt="SkillBridge logo">
        </div>
        <h1 class="dashboard-header-title">Company Profile</h1>
        <nav class="dashboard-nav">
            <ul>
                <li><a href="company_dashboard.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="manage_internships.html"><i class="fas fa-briefcase"></i> Internships</a></li>
                <li><a href="view_applications.html"><i class="fas fa-users"></i> Applications</a></li>
                <li><a href="company_profile.html" class="active"><i class="fas fa-building"></i> Profile</a></li>
                <li><a href="../logout.html" id="logoutButton"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <div class="user-profile">
            <span id="companyNameDisplay">Company Name</span>
        </div>
    </header>

    <main class="dashboard-main-content">
        <h2 class="dashboard-section-title">Manage Your Company Profile</h2>

        <section class="company-profile-section form-card">
            <h3 class="dashboard-section-subtitle">Company Details</h3>
            <form id="companyProfileForm">
                <div class="input-group">
                    <label for="profileName">Company Name:</label>
                    <input type="text" id="profileName" required>
                </div>
                <div class="input-group">
                    <label for="profileEmail">Company Email:</label>
                    <input type="email" id="profileEmail" required>
                </div>
                <div class="input-group">
                    <label for="profilePhone">Phone Number:</label>
                    <input type="tel" id="profilePhone" placeholder="e.g., +1 (123) 456-7890">
                </div>
                <div class="input-group">
                    <label for="profileAddress">Address:</label>
                    <input type="text" id="profileAddress" placeholder="e.g., 123 Main St, Anytown, USA">
                </div>
                <div class="input-group">
                    <label for="profileWebsite">Website:</label>
                    <input type="url" id="profileWebsite" placeholder="https://www.yourcompany.com">
                </div>
                <div class="input-group">
                    <label for="profileIndustry">Industry:</label>
                    <input type="text" id="profileIndustry" placeholder="e.g., Software Development, Healthcare">
                </div>
                <div class="input-group">
                    <label for="profileDescription">Company Description:</label>
                    <textarea id="profileDescription" rows="6" placeholder="A brief overview of your company..."></textarea>
                </div>

                <div class="input-group logo-upload-section">
                    <label for="profileLogo">Company Logo:</label>
                    <div class="logo-preview-container">
                        <img id="logoPreview" src="https://via.placeholder.com/150x80/EEEEEE/888888?text=No+Logo" alt="Company Logo Preview">
                        <input type="file" id="profileLogo" accept="image/*">
                        <label for="profileLogo" class="btn-secondary btn-upload"><i class="fas fa-upload"></i> Upload New Logo</label>
                    </div>
                    <small>Recommended size: 150x80px. Max file size: 2MB.</small>
                </div>
                
                <div class="form-actions" style="justify-content: center;">
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                    <button type="button" id="resetProfileBtn" class="btn-secondary"><i class="fas fa-undo"></i> Reset</button>
                </div>
            </form>
        </section>
    </main>

    <script src="scripts/company_profile.js"></script>
</body>
</html>
