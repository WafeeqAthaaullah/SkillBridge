<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Listings</title>
    <link rel="stylesheet" href="css/company_portal.css"> <link rel="stylesheet" href="css/internships_style.css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="logo">
            <img src="../images/logo_white-removebg-preview.png" alt="Platform Logo">
        </div>
        <h1 class="dashboard-header-title">Internship Listings</h1>
        <nav class="dashboard-nav">
            <ul>
                <li><a href="student_dashboard.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="internships.html" class="active"><i class="fas fa-briefcase"></i> Internships</a></li>
                <li><a href="student_applications.html"><i class="fas fa-file-alt"></i> My Applications</a></li>
                <li><a href="student_profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="../logout.html" id="logoutButton"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <div class="user-profile">
            <span id="studentNameDisplay">Student Name</span>
            </div>
    </header>

    <main class="dashboard-main-content">
        <h2 class="dashboard-section-title">Explore Internship Opportunities</h2>

        <section class="internship-filter-section form-card">
            <h3 class="dashboard-section-subtitle">Filter & Search Internships</h3>
            <div class="filter-grid">
                <div class="input-group">
                    <label for="keywordSearch">Keyword:</label>
                    <input type="text" id="keywordSearch" placeholder="e.g., Software, Marketing, Data">
                </div>
                <div class="input-group">
                    <label for="locationFilter">Location:</label>
                    <input type="text" id="locationFilter" placeholder="e.g., Remote, New York, Hybrid">
                </div>
                <div class="input-group">
                    <label for="skillsFilter">Skills:</label>
                    <input type="text" id="skillsFilter" placeholder="e.g., Python, SQL, Design">
                    <small>Separate skills with commas</small>
                </div>
                <div class="input-group">
                    <label for="stipendFilter">Min. Stipend:</label>
                    <input type="number" id="stipendFilter" placeholder="e.g., 1000">
                </div>
                <div class="input-group">
                    <label for="durationFilter">Max. Duration (months):</label>
                    <input type="number" id="durationFilter" placeholder="e.g., 6">
                </div>
                <div class="input-group">
                    <label for="companyFilter">Company:</label>
                    <input type="text" id="companyFilter" placeholder="e.g., Innovate Solutions">
                </div>
            </div>
            <div class="form-actions" style="justify-content: center; margin-top: 25px;">
                <button type="button" id="applyFiltersBtn" class="btn-primary"><i class="fas fa-filter"></i> Apply Filters</button>
                <button type="button" id="resetFiltersBtn" class="btn-secondary"><i class="fas fa-redo"></i> Reset Filters</button>
            </div>
        </section>

        <section class="internship-listings-section">
            <h3 class="dashboard-section-subtitle">Available Internships (<span id="internshipCount">0</span> found)</h3>
            <div class="internship-cards-container" id="internshipListingsContainer">
                <p class="no-data" id="noInternshipsMessage">No internships match your criteria. Try adjusting your filters!</p>
            </div>
        </section>

    </main>

    <script src="scripts/internships.js"></script>
</body>
</html>
