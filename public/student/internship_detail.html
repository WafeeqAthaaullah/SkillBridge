<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Details</title>
    <link rel="stylesheet" href="css/company_portal.css"> <link rel="stylesheet" href="css/internship_detail_style.css"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="logo">
            <img src="../images/logo_white-removebg-preview.png" alt="Platform Logo">
        </div>
        <h1 class="dashboard-header-title">Internship Details</h1>
        <nav class="dashboard-nav">
            <ul>
                <li><a href="student_dashboard.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="internships.html" class="active"><i class="fas fa-briefcase"></i> Internships</a></li>
                <li><a href="student_applications.html"><i class="fas fa-file-alt"></i> My Applications</a></li>
                <li><a href="student_profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="../logout.html" id="logoutButton"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <div class="user-profile dropdown">
            <span id="studentNameDisplay">Student Name</span>
        </div>
    </header>

    <main class="dashboard-main-content">
        <section class="internship-detail-section form-card">
            <div id="internshipDetailContainer">
                <h2 class="loading-message">Loading internship details...</h2>
            </div>
            <div class="detail-actions">
                <a href="internships.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back to Listings</a>
                <button id="applyNowBtn" class="btn-primary" style="display:none;"><i class="fas fa-paper-plane"></i> Apply Now</button>
            </div>
        </section>
    </main>

    <script src="scripts/internship_detail.js"></script>
</body>
</html>
